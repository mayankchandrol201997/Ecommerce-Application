spring.application.name=EcommerceProductService
server.port=8081

#FakeStore Configuration
fakestore.api.url = https://fakestoreapi.com
fakestore.api.path.product=/products

#UserService Configuration
userservice.base.url = http://EcommerceUserService/auth
userservice.validate.api.url = /validate

#Database Properties
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.show-sql=true
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost:3306/EcommerceProductService
spring.datasource.username=root
spring.datasource.password=root

#OAuth2.0 url
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082

#SSL Configuration
server.ssl.enabled=false
server.ssl.key-store=classpath:eCommerceApplication.p12
server.ssl.key-store-password=eCommerceApplication
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=eCommerceApplication

#Eureka client config
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone= http://localhost:8761/eureka

logging.level.org.springframework=trace


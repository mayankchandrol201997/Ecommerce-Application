spring.application.name=EcommerceUserService
server.port=8082

#Database Properties
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.show-sql=true
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost:3306/EcommerceUserService
spring.datasource.username=root
spring.datasource.password=root

token.expiry=3


#jks configuration
keyFile=userService.jks
password=userService
alias=userService


logging.level.org.springframework=trace

server.ssl.enabled=true
server.ssl.key-store=classpath:userService.p12
server.ssl.key-store-password=userservice
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=userservice
spring.application.name=ApiGateway
server.port=9000

# Eureka Config
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# SSL is disabled, so these are currently ignored
server.ssl.enabled=false

# NEW SYNTAX FOR SPRING BOOT 3.5+
# USER SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ECOMMERCEUSERSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/user/**,/role/**,/auth/**

# PRODUCT SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=product-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ECOMMERCEPRODUCTSERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/category/**,/product/**,/search/**

logging.level.org.springframework=info

#Actuator
management.endpoints.web.exposure.include=*
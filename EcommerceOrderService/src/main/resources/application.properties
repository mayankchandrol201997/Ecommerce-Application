spring.application.name=EcommerceOrderService
server.port=8083

#Database Properties
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.show-sql=true
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost:3306/EcommerceOrderService
spring.datasource.username=root
spring.datasource.password=root


#OAuth2.0 url
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://localhost:8082

#UserService Configuration
userservice.base.url = https://localhost:8082/auth
userservice.validate.api.url = /validate

#PaymentService Configuration
paymentService.base.url = http://localhost:8084/payment
paymentService.validate.api.url = /{id}

logging.level.org.springframework=trace